<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#2b1d10">
<title>As Portas de Jerusalém</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="img/icone-192.png">
<link rel="apple-touch-icon" href="img/icone-192.png">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<!-- TELA 1: O PORTAO. A senha define a seita e grava no localStorage. -->
<section id="tela-portao" class="tela tela-pergaminho ativa">
  <div class="cartela-central">
    <p class="ano" data-txt="ano"></p>
    <h1 class="titulo" data-txt="titulo"></h1>
    <p class="ornamento">&#10022; &#10022; &#10022;</p>
    <p class="abertura" data-txt="abertura"></p>
    <form id="form-portao" autocomplete="off">
      <label class="rotulo" for="senha-portao" data-txt="rotulo_senha"></label>
      <input id="senha-portao" type="text" autocapitalize="characters" autocomplete="off" spellcheck="false" required>
      <button type="submit" class="botao" data-txt="botao_portao"></button>
    </form>
    <p id="erro-portao" class="erro" role="alert"></p>
    <p class="assinatura" data-txt="subtitulo"></p>
  </div>
</section>

<!-- TELA 2: ABERTURA. Leitura fatiada (o viajante no tempo + a identidade da seita). -->
<section id="tela-abertura" class="tela tela-pergaminho">
  <div class="cartela-central abertura-cartela">
    <p id="abertura-rotulo" class="ano"></p>
    <div id="abertura-fluxo" class="fluxo-leitura"></div>
    <div id="abertura-pontos" class="pontos-progresso" aria-hidden="true"></div>
    <button id="abertura-prosseguir" class="botao" type="button"></button>
    <button id="abertura-pular" class="link-discreto" type="button"></button>
  </div>
</section>

<!-- TELA 3: O JOGO VIVO. Mapa e instrucoes na mesma tela (mapa + painel deslizante). -->
<section id="tela-jogo" class="tela">
  <div id="mapa"></div>

  <header id="header-mapa">
    <span id="selo-seita"></span>
    <span id="header-texto"></span>
    <span id="badge-gps" class="sem"></span>
  </header>

  <!-- controles flutuantes sobre o mapa -->
  <div id="controles-flutuantes">
    <button id="botao-centrar" class="botao-redondo" type="button" aria-label="Onde estamos">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 2c1.8 2.6 4 4.9 4 8a4 4 0 0 1-8 0c0-1.2.4-2.3 1-3.4-.2 1.9.6 3 1.8 3.2 1.3.2 2.4-.8 2.4-2.2C13.2 5.9 12.6 4 12 2z"/><rect x="11" y="14" width="2" height="8" rx="1" fill="currentColor"/></svg>
    </button>
    <button id="botao-ajuda" class="botao-redondo" type="button" aria-label="Uma mão na direção">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v9.6l3.3-3.3a1 1 0 0 1 1.4 1.4l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 0 1 1.4-1.4L11 13.6V4a1 1 0 0 1 1-1z"/><circle cx="12" cy="20" r="1.4" fill="currentColor"/></svg>
    </button>
    <button id="botao-inventario" class="botao-redondo" type="button" aria-label="A sacola">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M8 7V6a4 4 0 0 1 8 0v1h2.1a1 1 0 0 1 1 .9l1 10.9a2 2 0 0 1-2 2.2H4.8a2 2 0 0 1-2-2.2l1-10.9a1 1 0 0 1 1-.9H8zm2 0h4V6a2 2 0 0 0-4 0v1z"/></svg>
      <span id="inv-contador"></span>
    </button>
  </div>

  <!-- o painel vivo: bottom sheet com abas -->
  <div id="painel">
    <button id="painel-puxador" type="button" aria-label="Expandir ou recolher o painel"><span></span></button>
    <nav id="painel-abas" role="tablist">
      <button class="aba-btn ativa" data-aba="carta" type="button" data-txt="abrir_carta"></button>
      <button class="aba-btn" data-aba="caminho" type="button" data-txt="abrir_caminho"></button>
      <button class="aba-btn" data-aba="missao" type="button" data-txt="abrir_missao"></button>
    </nav>

    <div id="painel-corpo">
      <!-- ABA: A CARTA (narrativa fatiada, avanca no toque) -->
      <div id="aba-carta" class="aba ativa">
        <p id="carta-titulo" class="painel-titulo"></p>
        <div id="carta-fluxo" class="fluxo-leitura"></div>
        <div id="carta-pontos" class="pontos-progresso" aria-hidden="true"></div>
        <button id="carta-prosseguir" class="botao" type="button"></button>
      </div>

      <!-- ABA: O CAMINHO (passos revelados aos poucos, com tiquinho) -->
      <div id="aba-caminho" class="aba">
        <p class="painel-titulo" data-txt="rotulo_caminho"></p>
        <ol id="caminho-passos"></ol>
        <button id="caminho-mais" class="botao botao-claro" type="button"></button>
        <details id="caminho-fotos-bloco">
          <summary data-txt="abrir_carta">Fotos do caminho</summary>
          <div id="caminho-fotos"></div>
        </details>
      </div>

      <!-- ABA: A MISSAO (o que fazer no lugar + a senha) -->
      <div id="aba-missao" class="aba">
        <p class="painel-titulo" data-txt="abrir_missao"></p>
        <p id="missao-texto"></p>
        <form id="form-senha" autocomplete="off">
          <label id="senha-rotulo" class="rotulo" for="senha-input"></label>
          <input id="senha-input" type="text" autocapitalize="characters" autocomplete="off" spellcheck="false" required>
          <button type="submit" id="senha-botao" class="botao"></button>
        </form>
        <p id="senha-erro" class="erro" role="alert"></p>
      </div>
    </div>
  </div>
</section>

<!-- TELA 4: FRAGMENTO FINAL (leitura fatiada, no alto). -->
<section id="tela-final" class="tela tela-pergaminho">
  <div class="cartela-central abertura-cartela">
    <p id="final-seita" class="ano"></p>
    <h2 class="titulo-2" data-txt="titulo_final"></h2>
    <img id="final-foto" alt="" loading="lazy">
    <div id="final-fluxo" class="fluxo-leitura destaque"></div>
    <div id="final-pontos" class="pontos-progresso" aria-hidden="true"></div>
    <button id="final-prosseguir" class="botao" type="button"></button>
    <p class="ornamento">&#10022;</p>
    <p id="final-convergencia" class="texto-diwan oculto"></p>
  </div>
</section>

<!-- INVENTARIO: a sacola (overlay), itens coletados ao chegar nos pontos -->
<div id="tela-inventario" class="overlay oculto" role="dialog" aria-modal="true">
  <div class="overlay-cartela tela-pergaminho">
    <p class="ano">A sacola da corrente</p>
    <div id="inv-grade"></div>
    <button id="inv-voltar" class="botao botao-claro" type="button" data-txt="botao_voltar_mapa"></button>
  </div>
</div>

<!-- CERIMONIA: o item encontrado ao chegar no ponto (overlay curto) -->
<div id="item-ganho" class="oculto" aria-live="polite">
  <div class="item-ganho-cartela">
    <p class="item-ganho-rotulo">Vocês encontraram</p>
    <div id="item-ganho-glifo"></div>
    <p id="item-ganho-nome"></p>
    <p id="item-ganho-sobre"></p>
  </div>
</div>

<!-- FLASH dourado da cerimonia de chegada -->
<div id="flash-cerimonia" class="oculto" aria-hidden="true"></div>

<!-- HISTORICO: as cartas recebidas, em ordem (overlay, aberto pelos carimbos) -->
<div id="tela-cartas" class="overlay oculto" role="dialog" aria-modal="true">
  <div class="overlay-cartela tela-pergaminho">
    <p class="ano">As cartas até aqui</p>
    <div id="cartas-lista"></div>
    <button id="cartas-voltar" class="botao botao-claro" type="button" data-txt="botao_voltar_mapa"></button>
  </div>
</div>

<!-- Aviso de fora do caminho (advisory, nunca bloqueia) -->
<div id="aviso" class="oculto" role="dialog" aria-modal="true">
  <div class="aviso-cartela">
    <h3 data-txt="titulo_aviso"></h3>
    <p id="aviso-texto"></p>
    <button id="aviso-fechar" class="botao" type="button" data-txt="botao_entendido"></button>
  </div>
</div>

<div id="toast" class="oculto" role="status"></div>

<!-- Painel de calibracao: escondido. Abrir com ?debug=1 ou 7 toques no cabecalho do mapa. -->
<aside id="painel-debug" class="oculto"></aside>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
